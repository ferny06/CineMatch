<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Mis Mensajes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div *ngIf="cargando" class="loading-state">
    <ion-spinner name="crescent" color="warning"></ion-spinner>
  </div>

  <ion-list *ngIf="!cargando" lines="full" style="background: transparent;">

    <div *ngIf="conversaciones.length === 0" class="empty-state">
      <ion-icon name="chatbubbles-outline"></ion-icon>
      <p>No tienes conversaciones aún.<br>¡Envíale un mensaje a un amigo!</p>
    </div>

    <ion-item
      *ngFor="let c of conversaciones"
      (click)="irAConversacion(c.amigoId)"
      style="--background: transparent;"
    >
      <ion-avatar slot="start">
        <img [src]="c.avatar_url" />
      </ion-avatar>

      <ion-label>
        <div style="display: flex; justify-content: space-between;">
          <h2 style="color: white; font-weight: 600;">{{ c.nombre }}</h2>
          <span style="color: #8e94a0; font-size: 0.8rem;">{{ formatearFecha(c.fecha) }}</span>
        </div>
        <p
          [style.color]="c.leido === 'N' ? 'white' : '#8e94a0'"
          [style.font-weight]="c.leido === 'N' ? 'bold' : 'normal'"
        >
          {{ c.ultimoMensaje }}
        </p>
      </ion-label>

      <ion-badge *ngIf="c.leido === 'N'" slot="end" color="warning">•</ion-badge>
    </ion-item>

  </ion-list>
</ion-content>

<app-footer-nav activo="mensajes"></app-footer-nav>
