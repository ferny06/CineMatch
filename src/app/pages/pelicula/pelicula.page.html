<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text=""></ion-back-button>
    </ion-buttons>
    <ion-title class="text-white">Detalle</ion-title>
  </ion-toolbar>
</ion-header>


<ion-content >
  <div class="poster-wrapper">
    <img [src]="peli.poster_url" class="main-poster" />
    <div class="gradient-overlay"></div>
  </div>

  <div class="main-content ion-padding">
    <div class="d-flex justify-content-between align-items-start">
      <h1 class="movie-title text-white">{{ peli.titulo }}</h1>
      
      <div class="rating-badge">
        <ion-icon name="star" color="warning"></ion-icon>
        <span class="text-white">{{ peli.promedio_votos }}</span>
      </div>
    </div>

    <p class="text-muted small">
      {{ peli.fecha_estreno }} • {{ peli.duracion_min }} min
    </p>

    <div class="mb-4">
      <h5 class="text-white fw-bold">Sinopsis</h5>
      <p class="text-secondary">{{ peli.sinopsis }}</p>
    </div>
  </div>

  <ion-button expand="block"  (click)="irAEscribirResena()" class="boton-reseña ion-margin-top">
  <ion-icon name="create-outline" slot="start"></ion-icon>
  ¿Qué opinas de esta película?
</ion-button>

</ion-content>
