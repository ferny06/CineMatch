<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Mis Listas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="add-btn-container">
    <ion-button expand="block" fill="outline" class="add-lista-btn" (click)="agregarLista()">
      <ion-icon name="add-circle-outline" slot="start"></ion-icon>
      Agregar lista
    </ion-button>
  </div>

  <div *ngIf="listas.length === 0" class="empty-container">
    <ion-icon name="list-outline"></ion-icon>
    <p>No tienes listas guardadas</p>
  </div>

  <ion-grid *ngIf="listas.length > 0">
    <ion-row>
      <ion-col size="6" *ngFor="let lista of listas">
        <ion-card class="movie-card" [routerLink]="['/pelicula', lista.pelicula_id]">
          <div class="poster-container">
            <img [src]="lista.poster_url" />
            <ion-badge [color]="lista.sync_status === 'synced' ? 'success' : 'warning'">
              <ion-icon [name]="lista.sync_status === 'synced' ? 'cloud-done' : 'cloud-upload'"></ion-icon>
            </ion-badge>
          </div>
          <ion-card-header>
            <ion-card-subtitle>{{ lista.titulo }}</ion-card-subtitle>
            <p class="date-text">{{ lista.created_at | date:'dd/MM/yyyy' }}</p>
          </ion-card-header>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
